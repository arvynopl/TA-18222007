[theme]
base = "light"
primaryColor = "#2563EB"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FA"
textColor = "#1C1E21"
font = "sans serif"

[theme.sidebar]
backgroundColor = "#F5F7FA"
secondaryBackgroundColor = "#FFFFFF"
